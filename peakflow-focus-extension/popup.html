<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #141414;
      color: #e5e5e5;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }

    .mode {
      font-size: 12px;
      color: #a3a3a3;
      margin-bottom: 12px;
    }

    .timer-display {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
      padding: 12px 0;
      margin-bottom: 12px;
    }

    .timer-display.work { color: #22c55e; }
    .timer-display.break { color: #60a5fa; }
    .timer-display.idle { color: #525252; }

    .divider {
      border: none;
      border-top: 1px solid #262626;
      margin: 12px 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .site-list {
      list-style: none;
      max-height: 120px;
      overflow-y: auto;
    }

    .site-list li {
      font-size: 12px;
      color: #a3a3a3;
      padding: 3px 0;
    }

    .empty-state {
      font-size: 12px;
      color: #525252;
      font-style: italic;
    }

    .disconnected-msg {
      text-align: center;
      padding: 20px 0;
      color: #a3a3a3;
      font-size: 13px;
    }

    .disconnected-msg .icon { font-size: 24px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="status-dot"></div>
    <h1>PeakFlow Focus</h1>
  </div>

  <div id="connected-view">
    <div class="mode" id="mode-text">—</div>
    <div class="timer-display idle" id="timer-display">--:--</div>
    <hr class="divider">
    <div class="section-title">Blocked sites</div>
    <ul class="site-list" id="site-list"></ul>
    <div class="empty-state" id="empty-state" style="display:none">No sites blocked right now</div>
  </div>

  <div id="disconnected-view" style="display:none">
    <div class="disconnected-msg">
      <div class="icon">&#128268;</div>
      <div>PeakFlow is not running</div>
      <div style="font-size:11px;color:#525252;margin-top:4px">Launch PeakFlow to enable site blocking</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
